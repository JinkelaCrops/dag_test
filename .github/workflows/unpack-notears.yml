name: Unpack notears.zip

on:
  push:
    paths:
      - '.github/workflows/unpack-notears.yml'
      - 'trigger-unpack-notears.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack archive
        run: |
          set -euo pipefail
          rm -rf notears
          unzip -q notears.zip
          rm -rf notears/.git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notears
          if git diff --cached --quiet; then
            echo "No unpack changes to commit"
          else
            git commit -m "Unpack notears.zip into notears directory"
            git push
          fi
